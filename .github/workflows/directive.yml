name: 指示を反映

# ダッシュボードの「指示を出す」から作られたIssueを受け取り、
# 自然言語の指示を解釈して投稿設定に反映する。
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      directive:
        description: '投稿の方向性の指示（例：動画の話を増やして）'
        required: true
        type: string

jobs:
  apply:
    # Issue経由の場合は「指示」ラベル付き、またはタイトルが【指示】で始まるものだけ処理
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, '指示') ||
      startsWith(github.event.issue.title, '【指示】')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv

      - name: 指示を解釈して反映
        id: apply
        env:
          TZ: Asia/Tokyo
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # シェル展開を避けるため必ず環境変数経由で渡す
          DIRECTIVE_BODY: ${{ github.event.inputs.directive || github.event.issue.body }}
        run: |
          set -o pipefail
          python apply_directive.py "$DIRECTIVE_BODY" 2>&1 | tee result.txt
          {
            echo 'output<<RESULT_EOF'
            cat result.txt
            echo 'RESULT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: ナレッジを再生成
        run: python export_to_obsidian.py || true

      - name: 変更を保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add strategy.json topics.json knowledge/
          git diff --staged --quiet || git commit -m "directive: 指示による設定変更 [skip ci]"
          git push

      - name: 結果をIssueに返信
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const output = process.env.RESULT || '(出力なし)';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **指示を反映しました**\n\n次の投稿から適用されます。\n\n\`\`\`\n${output}\n\`\`\``,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
        env:
          RESULT: ${{ steps.apply.outputs.output }}

      - name: 失敗時もIssueに返信
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ 指示の反映に失敗しました。指示の内容を変えてもう一度お試しください。\n\n実行ログ: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
