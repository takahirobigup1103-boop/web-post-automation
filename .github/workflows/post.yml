name: Threads 自動投稿

# GitHubのcronは毎時0分が混雑して遅延・スキップされやすいため、
# 10分にずらし、さらに40分に保険実行を置く（投稿済みなら自動スキップ）
on:
  schedule:
    - cron: '10 22 * * *'  # 07:10 JST (morning)
    - cron: '40 22 * * *'  # 07:40 JST (morning 保険)
    - cron: '10 1 * * *'   # 10:10 JST (midmorning)
    - cron: '40 1 * * *'   # 10:40 JST (midmorning 保険)
    - cron: '10 4 * * *'   # 13:10 JST (afternoon)
    - cron: '40 4 * * *'   # 13:40 JST (afternoon 保険)
    - cron: '10 7 * * *'   # 16:10 JST (late_afternoon)
    - cron: '40 7 * * *'   # 16:40 JST (late_afternoon 保険)
    - cron: '10 11 * * *'  # 20:10 JST (evening)
    - cron: '40 11 * * *'  # 20:40 JST (evening 保険)
  workflow_dispatch:        # 手動実行（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv requests-oauthlib

      - name: Post to Threads
        env:
          TZ: Asia/Tokyo
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          POST_HASHTAGS: "#ホームページ制作 #中小企業 #集客 #web制作"
          POST_TO_X: "false"
          LINE_URL: "https://lin.ee/OmRxAFw"
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            *" 22 * * *") python post.py --slot morning ;;
            *" 11 * * *") python post.py --slot evening ;;
            *" 1 * * *")  python post.py --slot midmorning ;;
            *" 4 * * *")  python post.py --slot afternoon ;;
            *" 7 * * *")  python post.py --slot late_afternoon ;;
            *)            python post.py --slot morning --force ;;
          esac

      - name: 投稿履歴を保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add post_history.json
          git diff --staged --quiet || git commit -m "auto: post history [skip ci]"
          git push
